  <style amp-custom>
    :root {
      --maroon: #24243e;
      --maroon-deep: #302b63;
      --gold: #fbbf24;
      --gold-deep: #f59e0b;
      --text: #f3f4f6;
      --ink: #f3f4f6;
      --line: rgba(251, 191, 36, 0.4);
      --radius: 18px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
      position: relative;
    }

    /* Dragon Container - Di Depan Card */
    .dragon-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .dragonball {
      position: absolute;
      right: -8%;
      top: 50%;
      transform: translateY(-50%);
      width: 40vw;
      max-width: 420px;
      min-width: 250px;
      height: auto;
      opacity: 0.75;
      filter: drop-shadow(0 0 25px rgba(220, 38, 38, 0.7)) 
              drop-shadow(0 0 50px rgba(251, 191, 36, 0.4));
      animation: floatRight 7s ease-in-out infinite;
    }

    .dragonball1 {
      position: absolute;
      left: -8%;
      top: 50%;
      transform: translateY(-50%) scaleX(-1);
      width: 40vw;
      max-width: 420px;
      min-width: 250px;
      height: auto;
      opacity: 0.75;
      filter: drop-shadow(0 0 25px rgba(220, 38, 38, 0.7)) 
              drop-shadow(0 0 50px rgba(251, 191, 36, 0.4));
      animation: floatLeft 7s ease-in-out infinite;
    }

    .red-overlay {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 700px 500px at 50% 50%, rgba(220, 38, 38, 0.18) 0%, transparent 65%),
        radial-gradient(ellipse 1000px 700px at 50% 50%, rgba(251, 191, 36, 0.10) 0%, transparent 75%);
      pointer-events: none;
      animation: pulseOverlay 5s ease-in-out infinite;
    }

    @keyframes floatRight {
      0%, 100% {
        transform: translateY(-50%) translateX(0) rotate(0deg);
      }
      25% {
        transform: translateY(-48%) translateX(-12px) rotate(-2deg);
      }
      50% {
        transform: translateY(-52%) translateX(-20px) rotate(2deg);
      }
      75% {
        transform: translateY(-48%) translateX(-12px) rotate(-1deg);
      }
    }

    @keyframes floatLeft {
      0%, 100% {
        transform: translateY(-50%) scaleX(-1) translateX(0) rotate(0deg);
      }
      25% {
        transform: translateY(-48%) scaleX(-1) translateX(-12px) rotate(2deg);
      }
      50% {
        transform: translateY(-52%) scaleX(-1) translateX(-20px) rotate(-2deg);
      }
      75% {
        transform: translateY(-48%) scaleX(-1) translateX(-12px) rotate(1deg);
      }
    }

    @keyframes pulseOverlay {
      0%, 100% {
        opacity: 0.5;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.03);
      }
    }

    .wrap {
      min-height: 100vh;
      height: 100vh;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .card {
      width: 100%;
      max-width: 580px;
      max-height: calc(100vh - 12px);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      overflow-y: auto;
      background:
        radial-gradient(140% 120% at 0% 0%, rgba(251, 191, 36, 0.10), transparent 45%),
        linear-gradient(to bottom, rgba(26, 26, 46, 0.97), rgba(26, 26, 46, 0.99));
      box-shadow:
        inset 0 0 0 1px rgba(251, 191, 36, .10),
        0 20px 50px rgba(0, 0, 0, .85),
        0 0 40px rgba(251, 191, 36, .22);
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 16px;
      padding: 1.5px;
      background: linear-gradient(135deg, #fbbf24, #dc2626, #991b1b, #fbbf24);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: glow 6s linear infinite;
    }

    @keyframes glow {
      0% {
        filter: hue-rotate(0) brightness(1)
      }
      50% {
        filter: hue-rotate(-10deg) brightness(1.15)
      }
      100% {
        filter: hue-rotate(0) brightness(1)
      }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 6px 8px;
      border-bottom: 1px dashed rgba(251, 191, 36, .30);
    }

    .brand-logo {
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #dc2626, #ef4444, #fbbf24);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .brand-name {
      font-weight: 700;
      letter-spacing: .2px;
      font-size: 10.5px;
      line-height: 1.3;
    }

    .banner-wrap {
      position: relative;
      margin: 8px 0 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(251, 191, 36, .05), rgba(251, 191, 36, .02));
      box-shadow: 
        inset 0 0 0 1px rgba(251, 191, 36, .08),
        0 8px 25px rgba(0, 0, 0, 0.6);
    }

    .banner-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(70deg, transparent 46%, rgba(251, 191, 36, .22) 50%, transparent 54%);
      mix-blend-mode: screen;
      filter: blur(8px);
      transform: translateX(-60%);
      animation: scan 5s linear infinite;
    }

    @keyframes scan {
      to {
        transform: translateX(60%)
      }
    }

    .cta {

      gap: 8px;
      margin-top: 10px;
      grid-template-columns: 1fr;

    .btn {
      --shine: rgba(255, 255, 255, .45);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      user-select: none;
      font-weight: 800;
      letter-spacing: .5px;
      font-size: 16px;
      padding: 12px 18px;
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .65), 0 0 25px rgba(220, 38, 38, .35);

      overflow: hidden;
      color: var(--ink);
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      text-transform: uppercase;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: -160% -40%;
      background: linear-gradient(75deg, transparent 46%, var(--shine) 50%, transparent 54%);
      transform: translateX(-60%);
    }

    .btn:active {
      transform: scale(0.98);
      filter: saturate(1.10) brightness(1.12);
    }

    .btn-login {
      background:

        linear-gradient(135deg, #dc2626, #b91c1c, #991b1b);
      color: var(--ink);
      border: 1px solid rgba(220, 38, 38, 0.65);
    }

    .btn-daftar {
      background:

        linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
      color: #1a1a2e;
      border: 1px solid rgba(251, 191, 36, .70);
    }

    .ticker {
      height: 34px;
      overflow: hidden;
      position: relative;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background:
        radial-gradient(100% 140% at 0% 50%, rgba(251, 191, 36, .14), transparent 70%),
        linear-gradient(180deg, rgba(251, 191, 36, .07), rgba(251, 191, 36, .03));
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%);
    }

    .ticker-track {
      display: flex;
      align-items: center;
      height: 100%;
      width: max-content;
      animation: tmove 28s linear infinite;
    }

    .ticker-line {
      display: flex;
      align-items: center;
      height: 34px;
      white-space: nowrap;
      padding: 0 14px;
      font-weight: 700;
      font-size: 12px;
      line-height: 1;
      letter-spacing: .3px;
    }

    .neon {
      color: var(--gold);
      text-shadow: 
        0 0 10px rgba(251, 191, 36, 1), 
        0 0 20px rgba(251, 191, 36, .70),
        0 0 30px rgba(251, 191, 36, .40);
      font-weight: 800;
    }

    .sep {
      opacity: .55;
      margin: 0 14px;
      font-size: 0.75em;
    }

    @keyframes tmove {
      from {
        transform: translateX(0)
      }
      to {
        transform: translateX(-50%)
      }
    }

    .meters {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      grid-template-columns: 1fr;
    }

    .meter {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: 
        radial-gradient(130% 110% at 0% 0%, rgba(251, 191, 36, .10), transparent 65%),
        linear-gradient(180deg, rgba(251, 191, 36, .06), rgba(251, 191, 36, .03));
      box-shadow: inset 0 0 0 1px rgba(251, 191, 36, .10);
    }

    .meter-label {
      font-size: 12px;
      font-weight: 600;
      opacity: .97;
      margin-bottom: 7px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meter-label span:last-child {
      color: var(--gold);
      font-weight: 800;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.7);
    }

    .meter-bar {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(251, 191, 36, .12);
      border: 1px solid rgba(251, 191, 36, .35);
      position: relative;
    }

    .meter-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .30) 50%, transparent);
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      from {
        transform: translateX(-100%);
      }
      to {
        transform: translateX(100%);
      }
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, #dc2626, #ef4444, #fbbf24, #f59e0b);
      box-shadow: 
        0 0 18px rgba(251, 191, 36, .50),
        inset 0 1px 0 rgba(255, 255, 255, .30);
      position: relative;
    }

    .fill.t1 {
      width: 85%;
      animation: pulseA 4.5s ease-in-out infinite;
    }

    .fill.t2 {
      width: 92%;
      animation: pulseB 5.2s ease-in-out infinite;
    }

    @keyframes pulseA {
      0% {
        width: 76%;
        filter: brightness(1);
      }
      50% {
        width: 88%;
        filter: brightness(1.18);
      }
      100% {
        width: 80%;
        filter: brightness(1);
      }
    }

    @keyframes pulseB {
      0% {
        width: 84%;
        filter: brightness(1);
      }
      50% {
        width: 95%;
        filter: brightness(1.18);
      }
      100% {
        width: 87%;
        filter: brightness(1);
      }
    }

    /* Mobile Optimization */
    @media (max-width: 480px) {
      .wrap {
        padding: 6px;

      .card {
        padding: 10px;
      }

      .brand-logo {
        font-size: 20px;
      }

      .brand-name {
        font-size: 11px;
      }

      .btn {
        font-size: 16px;
        padding: 13px 18px;
      }

      .ticker {
        height: 34px;
      }

      .ticker-line {
        height: 34px;
        font-size: 12px;
      }

      .dragonball,
      .dragonball1 {
        width: 35vw;
        min-width: 200px;
        opacity: 0.70;

    }

    /* Very Small Screens */
    @media (max-width: 360px) {
      .brand-logo {

      .brand-name {
        font-size: 10px;
      }

      .dragonball,

        width: 32vw;
        min-width: 180px;
        opacity: 0.65;
      }
    }
  </style>
